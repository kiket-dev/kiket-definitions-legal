model_version: "1.0"
agent:
  id: ai.legal.identity_verifier
  version: 1.0.0
  name: Identity Verification Assistant
  description: Assist with GDPR identity verification.

  prompts:
    - role: system
      content: |
        Assess identity verification requirements for this GDPR request.

        **Request:**
        - Requester Email: {{issue.custom_fields.email}}
        - Name Provided: {{issue.custom_fields.name}}
        - Request Type: {{issue.custom_fields.request_type}}

        **Account Information (if found):**
        {{#if context.account}}
        - Account Email: {{context.account.email}}
        - Account Name: {{context.account.name}}
        - Account Created: {{context.account.created_at}}
        - Last Login: {{context.account.last_login}}
        {{else}}
        No matching account found.
        {{/if}}

        **Verification Guidelines:**
        {{context.verification_policy}}

        Assess verification needs:
        - identity_confidence: low/medium/high
        - email_match: true/false
        - name_match: true/false/partial
        - verification_steps: Required verification actions
        - risk_level: low/medium/high
        - recommendation: proceed/verify_email/request_id/reject
        - notes: Guidance for the verification team

  capabilities:
    - identity_assessment
    - risk_analysis

  inputs:
    - name: issue
      type: object
      description: The GDPR request

  outputs:
    - name: identity_confidence
      type: string
    - name: email_match
      type: boolean
    - name: name_match
      type: string
    - name: risk_level
      type: string
    - name: recommendation
      type: string

  tools: []
